<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElecJuanCarlos Pro</title>
    <!-- Tailwind CSS para diseño moderno -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    <style>
        .resistor-body {
            background: linear-gradient(to bottom, #d1b48c 0%, #e6d2b5 50%, #d1b48c 100%);
        }
        .band { width: 12px; height: 110%; box-shadow: 1px 0 2px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-slate-900 text-white font-sans pb-10">

    <!-- Header con Logo -->
    <header class="p-6 text-center bg-blue-600 shadow-lg mb-6">
        <svg class="mx-auto mb-2" width="50" height="50" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="45" fill="#1e293b" stroke="white" stroke-width="2"/>
            <path d="M55 20 L35 50 L50 50 L45 80 L65 50 L50 50 Z" fill="#facc15" />
        </svg>
        <h1 class="text-2xl font-bold tracking-tighter">ELECTRO-CALC PRO</h1>
        <p class="text-blue-100 text-xs">Herramientas para Ingenieros y Aficionados</p>
    </header>

    <main class="p-4 max-w-4xl mx-auto grid gap-6">
        
        <!-- CALCULADORA LEY DE OHM -->
        <section class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h2 class="text-blue-400 font-bold mb-4 flex items-center italic underline">⚡ LEY DE OHM</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="text-[10px] uppercase text-slate-400">Voltaje (V)</label>
                    <input id="v_input" type="number" placeholder="Ej: 12" class="w-full bg-slate-700 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="text-[10px] uppercase text-slate-400">Resistencia (Ω)</label>
                    <input id="r_input" type="number" placeholder="Ej: 220" class="w-full bg-slate-700 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                </div>
            </div>
            <button onclick="calcularOhm()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">CALCULAR CORRIENTE (I)</button>
            <div id="ohm_res" class="mt-4 text-center text-2xl font-mono text-yellow-400">---</div>
        </section>

        <!-- CÓDIGO DE COLORES -->
        <section class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700">
            <h2 class="text-orange-400 font-bold mb-4 italic underline">🎨 CÓDIGO DE COLORES</h2>
            
            <div class="flex justify-center items-center py-8 bg-slate-900 rounded-xl mb-6">
                <div class="w-10 h-1 bg-gray-500"></div>
                <div class="resistor-body w-48 h-14 rounded-full flex justify-around items-center px-4 overflow-hidden shadow-inner">
                    <div id="band1" class="band bg-brown-700"></div>
                    <div id="band2" class="band bg-black"></div>
                    <div id="band3" class="band bg-red-600"></div>
                    <div id="band4" class="band bg-yellow-600 ml-4"></div>
                </div>
                <div class="w-10 h-1 bg-gray-500"></div>
            </div>

            <div class="grid grid-cols-2 gap-3 text-xs">
                <select id="s1" onchange="actualizarRes()" class="bg-slate-700 p-3 rounded-lg">
                    <option value="0">Negro (0)</option><option value="1" selected>Marrón (1)</option>
                    <option value="2">Rojo (2)</option><option value="3">Naranja (3)</option>
                    <option value="4">Amarillo (4)</option><option value="5">Verde (5)</option>
                    <option value="6">Azul (6)</option><option value="7">Violeta (7)</option>
                </select>
                <select id="s2" onchange="actualizarRes()" class="bg-slate-700 p-3 rounded-lg">
                    <option value="0" selected>Negro (0)</option><option value="1">Marrón (1)</option>
                    <option value="2">Rojo (2)</option><option value="3">Naranja (3)</option>
                </select>
                <select id="s3" onchange="actualizarRes()" class="bg-slate-700 p-3 rounded-lg">
                    <option value="1">x1</option><option value="10">x10</option>
                    <option value="100" selected>x100</option><option value="1000">x1k</option>
                    <option value="10000">x10k</option><option value="1000000">x1M</option>
                </select>
                <select id="s4" onchange="actualizarRes()" class="bg-slate-700 p-3 rounded-lg">
                    <option value="5">±5% (Oro)</option><option value="10">±10% (Plata)</option>
                </select>
            </div>
            
            <div id="res_final" class="text-3xl font-bold text-center mt-6 text-white uppercase">1000 Ω ±5%</div>
            <button onclick="guardarCalculo()" class="w-full mt-4 bg-slate-700 hover:bg-slate-600 py-2 rounded-lg text-sm transition">💾 GUARDAR CÁLCULO</button>
        </section>

        <!-- HISTORIAL -->
        <section>
            <h3 class="text-slate-500 uppercase text-xs font-bold mb-3 tracking-widest">Historial Guardado</h3>
            <div id="lista_historial" class="space-y-2"></div>
        </section>
    </main>

    <script>
        const colores = ["black", "brown", "red", "orange", "yellow", "green", "blue", "violet", "gray", "white"];
        const coloresTole = { "5": "#d4af37", "10": "#c0c0c0" };

        function calcularOhm() {
            const v = document.getElementById('v_input').value;
            const r = document.getElementById('r_input').value;
            if(v && r && r > 0) {
                const res = (v/r).toFixed(4);
                document.getElementById('ohm_res').innerText = res + " Amperios (A)";
            } else {
                document.getElementById('ohm_res').innerText = "Error";
            }
        }

        function actualizarRes() {
            const b1 = document.getElementById('s1').value;
            const b2 = document.getElementById('s2').value;
            const mult = document.getElementById('s3').value;
            const tole = document.getElementById('s4').value;

            document.getElementById('band1').style.backgroundColor = colores[b1];
            document.getElementById('band2').style.backgroundColor = colores[b2];
            document.getElementById('band3').style.backgroundColor = colores[Math.log10(mult)];
            document.getElementById('band4').style.backgroundColor = coloresTole[tole];

            let valor = (parseInt(b1) * 10 + parseInt(b2)) * parseFloat(mult);
            let display = valor >= 1000000 ? (valor/1000000).toFixed(1) + " M" : 
                          valor >= 1000 ? (valor/1000).toFixed(1) + " k" : valor;
            
            document.getElementById('res_final').innerText = `${display} Ω ±${tole}%`;
        }

        function guardarCalculo() {
            const val = document.getElementById('res_final').innerText;
            let hist = JSON.parse(localStorage.getItem('electro_hist')) || [];
            hist.unshift({val, time: new Date().toLocaleTimeString()});
            if(hist.length > 5) hist.pop(); // Solo guardamos los últimos 5
            localStorage.setItem('electro_hist', JSON.stringify(hist));
            mostrarHistorial();
        }

        function mostrarHistorial() {
            const h = JSON.parse(localStorage.getItem('electro_hist')) || [];
            const container = document.getElementById('lista_historial');
            if(h.length === 0) {
                container.innerHTML = '<p class="text-slate-600 text-xs italic">No hay registros.</p>';
                return;
            }
            container.innerHTML = h.map(i => 
                `<div class="bg-slate-800 p-3 rounded-lg flex justify-between border-l-4 border-blue-600 animate-pulse">
                    <span class="font-bold text-blue-200">${i.val}</span>
                    <span class="text-slate-500 text-[10px]">${i.time}</span>
                </div>`).join('');
        }
        window.onload = mostrarHistorial;
    </script>
</body>
</html>
