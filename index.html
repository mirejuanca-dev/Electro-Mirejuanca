<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirejuanca - Dashboard Electrónico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .resistor-body {
            background: #d1b894;
            height: 40px;
            width: 150px;
            border-radius: 20px;
            position: relative;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 15px;
            margin: 20px auto;
        }
        .band {
            width: 10px;
            height: 100%;
        }
        .hidden-section { display: none; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen text-slate-800">

    <header class="bg-indigo-700 text-white p-6 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold tracking-tight">Mirejuanca <span class="text-indigo-200 font-light text-xl">Dashboard</span></h1>
            <nav class="hidden md:block">
                <ul class="flex space-x-6">
                    <li><a href="#" onclick="showSection('home')" class="hover:text-indigo-200 transition">Inicio</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container mx-auto p-6">
        
        <!-- Menú Principal -->
        <div id="home" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div onclick="showSection('ohm')" class="glass-card p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all cursor-pointer border-t-4 border-indigo-500 group">
                <div class="bg-indigo-100 w-16 h-16 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition">
                    <i class="fas fa-bolt text-2xl text-indigo-600"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Ley de Ohm & Potencia</h3>
                <p class="text-slate-500">Cálculo de V, I, R y P con 2 datos.</p>
            </div>

            <div onclick="showSection('colores-a-valor')" class="glass-card p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all cursor-pointer border-t-4 border-emerald-500 group">
                <div class="bg-emerald-100 w-16 h-16 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition">
                    <i class="fas fa-palette text-2xl text-emerald-600"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Código a Valor</h3>
                <p class="text-slate-500">Obtén ohmios a partir de los colores.</p>
            </div>

            <div onclick="showSection('valor-a-colores')" class="glass-card p-8 rounded-2xl shadow-sm hover:shadow-xl transition-all cursor-pointer border-t-4 border-orange-500 group">
                <div class="bg-orange-100 w-16 h-16 rounded-full flex items-center justify-center mb-6 group-hover:scale-110 transition">
                    <i class="fas fa-microchip text-2xl text-orange-600"></i>
                </div>
                <h3 class="text-xl font-bold mb-2">Valor a Colores</h3>
                <p class="text-slate-500">Convierte ohmios a código de colores.</p>
            </div>
        </div>

        <!-- Sección Ohm -->
        <div id="ohm" class="hidden-section max-w-2xl mx-auto">
            <button onclick="showSection('home')" class="mb-4 text-indigo-600 font-semibold hover:underline">Volver</button>
            <div class="glass-card p-8 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-center">Ley de Ohm y Potencia</h2>
                <div class="grid grid-cols-2 gap-4">
                    <input type="number" id="v_in" class="p-3 border rounded-lg" placeholder="Voltaje (V)">
                    <input type="number" id="i_in" class="p-3 border rounded-lg" placeholder="Corriente (I)">
                    <input type="number" id="r_in" class="p-3 border rounded-lg" placeholder="Resistencia (R)">
                    <input type="number" id="p_in" class="p-3 border rounded-lg" placeholder="Potencia (P)">
                </div>
                <button onclick="calcOhm()" class="w-full mt-6 bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition">Calcular</button>
                <div id="ohm_results" class="mt-8 bg-slate-50 p-4 rounded-xl hidden text-center font-mono text-indigo-800">
                    <p id="res_text"></p>
                </div>
            </div>
        </div>

        <!-- Sección Colores a Valor -->
        <div id="colores-a-valor" class="hidden-section max-w-2xl mx-auto">
            <button onclick="showSection('home')" class="mb-4 text-emerald-600 font-semibold hover:underline">Volver</button>
            <div class="glass-card p-8 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-center">Identificador de Resistencia</h2>
                <div class="space-y-4">
                    <select id="band1" class="w-full p-3 border rounded-lg"></select>
                    <select id="band2" class="w-full p-3 border rounded-lg"></select>
                    <select id="band3" class="w-full p-3 border rounded-lg"></select>
                </div>
                <button onclick="calcValFromCol()" class="w-full mt-6 bg-emerald-600 text-white font-bold py-3 rounded-lg hover:bg-emerald-700 transition">Ver Valor</button>
                <div id="val_res" class="mt-6 text-center text-3xl font-bold text-emerald-700"></div>
            </div>
        </div>

        <!-- Sección Valor a Colores -->
        <div id="valor-a-colores" class="hidden-section max-w-2xl mx-auto">
            <button onclick="showSection('home')" class="mb-4 text-orange-600 font-semibold hover:underline">Volver</button>
            <div class="glass-card p-8 rounded-2xl shadow-lg text-center">
                <h2 class="text-2xl font-bold mb-6">Valor a Colores</h2>
                <input type="number" id="ohm_input" class="p-4 text-2xl border-2 border-orange-100 rounded-xl mb-6 outline-none focus:border-orange-500" placeholder="Ej: 4700">
                <div class="resistor-body">
                    <div id="v_band1" class="band rounded"></div>
                    <div id="v_band2" class="band rounded"></div>
                    <div id="v_band3" class="band rounded"></div>
                    <div class="band rounded bg-[#D4AF37]"></div>
                </div>
                <button onclick="calcColFromVal()" class="w-full mt-6 bg-orange-600 text-white font-bold py-3 rounded-lg hover:bg-orange-700 transition">Generar Colores</button>
            </div>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
