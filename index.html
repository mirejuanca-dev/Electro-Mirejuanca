<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroCalc Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .resistor-body { background: linear-gradient(to bottom, #d1b48c 0%, #e6d2b5 50%, #d1b48c 100%); }
        .band { width: 12px; height: 110%; box-shadow: 1px 0 2px rgba(0,0,0,0.3); }
    </style>
</head>
<body class="bg-slate-900 text-white pb-10 font-sans">
    <header class="p-6 text-center bg-blue-600 shadow-lg mb-6">
        <h1 class="text-2xl font-bold">ELECTRO-CALC PRO</h1>
    </header>
    <main class="p-4 max-w-4xl mx-auto grid gap-6">
        <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-blue-400 font-bold mb-4 italic text-lg">⚡ LEY DE OHM</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input id="v_input" type="number" placeholder="Voltaje (V)" class="bg-slate-700 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input id="r_input" type="number" placeholder="Resist. (Ω)" class="bg-slate-700 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="calcularOhm()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">CALCULAR (I)</button>
            <div id="ohm_res" class="mt-4 text-center text-2xl text-yellow-400 font-mono">---</div>
        </section>
    </main>
    <script>
        function calcularOhm(){
            const v = document.getElementById('v_input').value;
            const r = document.getElementById('r_input').value;
            if(v && r && r > 0) {
                document.getElementById('ohm_res').innerText = (v/r).toFixed(3) + " A";
            } else {
                document.getElementById('ohm_res').innerText = "Error";
            }
        }
    </script>
</body>
</html>
