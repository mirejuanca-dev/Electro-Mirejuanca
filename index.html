<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroCalc Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
</head>
<body class="bg-slate-900 text-white font-sans">
    <header class="p-6 text-center bg-blue-600 shadow-lg mb-6">
        <h1 class="text-2xl font-bold">ELECTRO-CALC PRO</h1>
    </header>
    <main class="p-4 max-w-4xl mx-auto space-y-6">
        <!-- LEY DE OHM -->
        <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-blue-400 font-bold mb-4">⚡ LEY DE OHM</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input id="v" type="number" placeholder="Voltaje (V)" class="bg-slate-700 p-3 rounded-lg outline-none w-full">
                <input id="r" type="number" placeholder="Resist. (Ω)" class="bg-slate-700 p-3 rounded-lg outline-none w-full">
            </div>
            <button onclick="calc()" class="w-full bg-blue-600 py-3 rounded-xl font-bold">CALCULAR CORRIENTE</button>
            <div id="res" class="mt-4 text-center text-xl text-yellow-400 font-mono">---</div>
        </div>
    </main>
    <script>
        function calc() {
            const v = document.getElementById('v').value;
            const r = document.getElementById('r').value;
            if(v && r) document.getElementById('res').innerText = (v/r).toFixed(3) + " Amperios (A)";
        }
    </script>
</body>
</html>
