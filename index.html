<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mirejuanca - Dashboard Pro</title>
    <!-- Tailwind CSS desde CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: white; border: 1px solid #e2e8f0; transition: all 0.3s; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .resistor-body { background: #d1b894; height: 40px; width: 160px; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; margin: 20px auto; }
        .band { width: 12px; height: 100%; border: 1px solid rgba(0,0,0,0.1); }
        /* Forzamos que las secciones estén ocultas por defecto excepto el home */
        .section-content { display: none; }
        #home { display: grid; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-800">

    <header class="bg-indigo-600 text-white p-6 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-3xl font-bold">Mirejuanca <span class="font-light opacity-80">Dashboard</span></h1>
            <button onclick="showSection('home')" class="bg-indigo-500 px-4 py-2 rounded-lg hover:bg-indigo-400 transition">Inicio</button>
        </div>
    </header>

    <main class="container mx-auto p-6">
        
        <!-- Dashboard Home -->
        <div id="home" class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div onclick="showSection('ohm')" class="glass-card p-8 rounded-2xl cursor-pointer border-t-4 border-indigo-500">
                <div class="bg-indigo-100 w-12 h-12 rounded-full flex items-center justify-center mb-4"><i class="fas fa-bolt text-indigo-600"></i></div>
                <h3 class="text-xl font-bold">Ley de Ohm & Potencia</h3>
                <p class="text-slate-500 text-sm">Calcula V, I, R y P con 2 datos conocidos.</p>
            </div>

            <div onclick="showSection('colores-a-valor')" class="glass-card p-8 rounded-2xl cursor-pointer border-t-4 border-emerald-500">
                <div class="bg-emerald-100 w-12 h-12 rounded-full flex items-center justify-center mb-4"><i class="fas fa-palette text-emerald-600"></i></div>
                <h3 class="text-xl font-bold">Código a Valor</h3>
                <p class="text-slate-500 text-sm">Convierte los colores de la resistencia a Ohmios.</p>
            </div>

            <div onclick="showSection('valor-a-colores')" class="glass-card p-8 rounded-2xl cursor-pointer border-t-4 border-orange-500">
                <div class="bg-orange-100 w-12 h-12 rounded-full flex items-center justify-center mb-4"><i class="fas fa-microchip text-orange-600"></i></div>
                <h3 class="text-xl font-bold">Valor a Colores</h3>
                <p class="text-slate-500 text-sm">Introduce los Ohmios y mira los colores.</p>
            </div>
        </div>

        <!-- Sección Ohm -->
        <div id="ohm" class="section-content max-w-xl mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-indigo-600">Calculadora Ley de Ohm</h2>
                <div class="grid grid-cols-2 gap-4 mb-6">
                    <input type="number" id="v_in" class="p-3 border rounded-lg outline-none focus:border-indigo-500" placeholder="Voltios (V)">
                    <input type="number" id="i_in" class="p-3 border rounded-lg outline-none focus:border-indigo-500" placeholder="Amperios (I)">
                    <input type="number" id="r_in" class="p-3 border rounded-lg outline-none focus:border-indigo-500" placeholder="Ohmios (R)">
                    <input type="number" id="p_in" class="p-3 border rounded-lg outline-none focus:border-indigo-500" placeholder="Watios (P)">
                </div>
                <button onclick="calcOhm()" class="w-full bg-indigo-600 text-white py-3 rounded-lg font-bold">Calcular Resultados</button>
                <div id="ohm_results" class="mt-6 p-4 bg-indigo-50 rounded-lg text-center font-mono text-indigo-900 hidden"></div>
            </div>
        </div>

        <!-- Sección Colores a Valor -->
        <div id="colores-a-valor" class="section-content max-w-xl mx-auto">
            <div class="bg-white p-8 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-emerald-600">Colores a Ohmios</h2>
                <div class="space-y-4">
                    <select id="band1" class="w-full p-3 border rounded-lg"></select>
                    <select id="band2" class="w-full p-3 border rounded-lg"></select>
                    <select id="band3" class="w-full p-3 border rounded-lg"></select>
                </div>
                <button onclick="calcValFromCol()" class="w-full bg-emerald-600 text-white py-3 rounded-lg font-bold mt-6">Obtener Valor</button>
                <div id="val_res" class="mt-6 text-center text-3xl font-bold text-emerald-700"></div>
            </div>
        </div>

        <!-- Sección Valor a Colores -->
        <div id="valor-a-colores" class="section-content max-w-xl mx-auto text-center">
            <div class="bg-white p-8 rounded-2xl shadow-lg">
                <h2 class="text-2xl font-bold mb-6 text-orange-600">Ohmios a Colores</h2>
                <input type="number" id="ohm_input" class="w-full p-4 text-2xl border-2 rounded-xl mb-6 outline-none focus:border-orange-500" placeholder="Ej: 4700">
                <div class="resistor-body">
                    <div id="v_band1" class="band"></div>
                    <div id="v_band2" class="band"></div>
                    <div id="v_band3" class="band"></div>
                    <div class="band bg-[#D4AF37]"></div>
                </div>
                <button onclick="calcColFromVal()" class="w-full bg-orange-600 text-white py-3 rounded-lg font-bold">Ver Bandas</button>
            </div>
        </div>

    </main>

    <script>
        const coloresRef = {
            "negro": {v: 0, hex: "#000000", m: 1},
            "marron": {v: 1, hex: "#8B4513", m: 10},
            "rojo": {v: 2, hex: "#FF0000", m: 100},
            "naranja": {v: 3, hex: "#FFA500", m: 1000},
            "amarillo": {v: 4, hex: "#FFFF00", m: 10000},
            "verde": {v: 5, hex: "#008000", m: 100000},
            "azul": {v: 6, hex: "#0000FF", m: 1000000},
            "violeta": {v: 7, hex: "#EE82EE", m: 10000000},
            "gris": {v: 8, hex: "#808080", m: 100000000},
            "blanco": {v: 9, hex: "#FFFFFF", m: 1000000000}
        };

        function showSection(id) {
            document.querySelectorAll('.section-content, #home').forEach(s => s.style.display = 'none');
            const target = document.getElementById(id);
            if(id === 'home') target.style.display = 'grid';
            else target.style.display = 'block';
        }

        window.onload = () => {
            const selects = ['band1', 'band2', 'band3'];
            const nombres = Object.keys(coloresRef);
            selects.forEach(s_id => {
                const el = document.getElementById(s_id);
                nombres.forEach(col => {
                    let opt = document.createElement('option');
                    opt.value = col;
                    opt.textContent = col.toUpperCase();
                    el.appendChild(opt);
                });
            });
        };

        function calcOhm() {
            let v = parseFloat(document.getElementById('v_in').value);
            let i = parseFloat(document.getElementById('i_in').value);
            let r = parseFloat(document.getElementById('r_in').value);
            let p = parseFloat(document.getElementById('p_in').value);

            if (v && i) { r = v/i; p = v*i; }
            else if (v && r) { i = v/r; p = (v**2)/r; }
            else if (i && r) { v = i*r; p = (i**2)*r; }
            else if (p && v) { i = p/v; r = (v**2)/p; }
            else if (p && i) { v = p/i; r = p/(i**2); }
            else if (p && r) { v = Math.sqrt(p*r); i = Math.sqrt(p/r); }

            const res = document.getElementById('ohm_results');
            res.classList.remove('hidden');
            res.innerHTML = `V: ${v.toFixed(2)}V | I: ${i.toFixed(2)}A<br>R: ${r.toFixed(2)}Ω | P: ${p.toFixed(2)}W`;
        }

        function calcValFromCol() {
            const b1 = document.getElementById('band1').value;
            const b2 = document.getElementById('band2').value;
            const b3 = document.getElementById('band3').value;
            const total = ((coloresRef[b1].v * 10) + coloresRef[b2].v) * coloresRef[b3].m;
            document.getElementById('val_res').textContent = total >= 1000 ? (total/1000) + " kΩ" : total + " Ω";
        }

        function calcColFromVal() {
            let val = document.getElementById('ohm_input').value;
            if (!val || val < 10) return alert("Introduce un valor válido");
            let sVal = Math.floor(val).toString();
            let d1 = parseInt(sVal[0]);
            let d2 = parseInt(sVal[1]);
            let ceros = sVal.length - 2;
            const lista = Object.keys(coloresRef);
            const c1 = lista.find(k => coloresRef[k].v === d1);
            const c2 = lista.find(k => coloresRef[k].v === d2);
            const c3 = lista.find(k => coloresRef[k].v === ceros);
            document.getElementById('v_band1').style.backgroundColor = coloresRef[c1].hex;
            document.getElementById('v_band2').style.backgroundColor = coloresRef[c2].hex;
            document.getElementById('v_band3').style.backgroundColor = coloresRef[c3].hex;
        }
    </script>
</body>
</html>
