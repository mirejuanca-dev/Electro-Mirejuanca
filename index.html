<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ElectroCalc Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="manifest" href="manifest.json">
    <style>
        .resistor-body { background: linear-gradient(to bottom, #d1b48c 0%, #e6d2b5 50%, #d1b48c 100%); }
        .band { width: 12px; height: 110%; box-shadow: 1px 0 2px rgba(0,0,0,0.3); transition: all 0.3s; }
    </style>
</head>
<body class="bg-slate-900 text-white pb-10">

    <header class="p-6 text-center bg-blue-600 shadow-lg mb-6">
        <h1 class="text-2xl font-bold">ELECTRO-CALC PRO</h1>
    </header>

    <main class="p-4 max-w-4xl mx-auto grid gap-6">
        
        <!-- SECCIÓN RESISTENCIAS -->
        <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700 shadow-xl">
            <h2 class="text-orange-400 font-bold mb-4 italic uppercase tracking-wider">🎨 Código de Colores</h2>
            
            <!-- Dibujo de la Resistencia -->
            <div class="flex justify-center items-center py-10 bg-slate-900 rounded-xl mb-6">
                <div class="w-10 h-1 bg-gray-500"></div>
                <div class="resistor-body w-48 h-14 rounded-full flex justify-around items-center px-4 overflow-hidden shadow-inner">
                    <div id="band1" class="band bg-brown-700"></div>
                    <div id="band2" class="band bg-black"></div>
                    <div id="band3" class="band bg-red-600"></div>
                    <div id="band4" class="band bg-yellow-600 ml-4"></div>
                </div>
                <div class="w-10 h-1 bg-gray-500"></div>
            </div>

            <!-- Selectores de Colores -->
            <div class="grid grid-cols-2 gap-3 text-sm">
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">BANDA 1</label>
                    <select id="s1" onchange="actualizarRes()" class="w-full bg-slate-700 p-2 rounded">
                        <option value="0">Negro</option><option value="1" selected>Marrón</option>
                        <option value="2">Rojo</option><option value="3">Naranja</option>
                        <option value="4">Amarillo</option><option value="5">Verde</option>
                        <option value="6">Azul</option><option value="7">Violeta</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">BANDA 2</label>
                    <select id="s2" onchange="actualizarRes()" class="w-full bg-slate-700 p-2 rounded">
                        <option value="0" selected>Negro</option><option value="1">Marrón</option>
                        <option value="2">Rojo</option><option value="3">Naranja</option>
                        <option value="4">Amarillo</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">MULTIPLICADOR</label>
                    <select id="s3" onchange="actualizarRes()" class="w-full bg-slate-700 p-2 rounded">
                        <option value="1">x1 (Negro)</option><option value="10">x10 (Marrón)</option>
                        <option value="100" selected>x100 (Rojo)</option><option value="1000">x1k (Naranja)</option>
                        <option value="10000">x10k (Amarillo)</option>
                    </select>
                </div>
                <div>
                    <label class="block text-[10px] text-slate-400 mb-1">TOLERANCIA</label>
                    <select id="s4" onchange="actualizarRes()" class="w-full bg-slate-700 p-2 rounded text-yellow-500">
                        <option value="5">±5% (Oro)</option><option value="10">±10% (Plata)</option>
                    </select>
                </div>
            </div>
            
            <div id="res_final" class="text-3xl font-bold text-center mt-8 text-white">1000 Ω ±5%</div>
        </section>

        <!-- SECCIÓN LEY DE OHM -->
        <section class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
            <h2 class="text-blue-400 font-bold mb-4 italic uppercase">⚡ Ley de Ohm</h2>
            <div class="grid grid-cols-2 gap-4 mb-4">
                <input id="v_input" type="number" placeholder="Voltios (V)" class="bg-slate-700 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
                <input id="r_input" type="number" placeholder="Ohmios (Ω)" class="bg-slate-700 p-3 rounded-lg outline-none focus:ring-2 focus:ring-blue-500">
            </div>
            <button onclick="calcularOhm()" class="w-full bg-blue-600 hover:bg-blue-500 py-3 rounded-xl font-bold transition">CALCULAR CORRIENTE</button>
            <div id="ohm_res" class="mt-4 text-center text-xl text-yellow-400 font-mono italic">---</div>
        </section>

    </main>

    <script>
        const colores = ["black", "brown", "red", "orange", "yellow", "green", "blue", "violet", "gray", "white"];
        const coloresTole = { "5": "#d4af37", "10": "#c0c0c0" };

        function actualizarRes() {
            const b1 = document.getElementById('s1').value;
            const b2 = document.getElementById('s2').value;
            const mult = document.getElementById('s3').value;
            const tole = document.getElementById('s4').value;

            document.getElementById('band1').style.backgroundColor = colores[b1];
            document.getElementById('band2').style.backgroundColor = colores[b2];
            document.getElementById('band3').style.backgroundColor = colores[Math.log10(mult)];
            document.getElementById('band4').style.backgroundColor = coloresTole[tole];

            let valor = (parseInt(b1) * 10 + parseInt(b2)) * parseFloat(mult);
            let d = valor >= 1000 ? (valor/1000).toFixed(1) + " k" : valor;
            document.getElementById('res_final').innerText = `${d} Ω ±${tole}%`;
        }

        function calcularOhm() {
            const v = document.getElementById('v_input').value;
            const r = document.getElementById('r_input').value;
            if(v && r) {
                document.getElementById('ohm_res').innerText = (v/r).toFixed(3) + " Amperios (A)";
            }
        }
    </script>
</body>
</html>
